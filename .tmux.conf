set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g allow-passthrough on
set -g xterm-keys on
set -g extended-keys on
set -as terminal-features ",tmux-256color:clipboard,alacritty:clipboard:extkeys"

# Keybindings
set -g prefix C-s

set -g base-index 1              # Window numbers start at 1
setw -g mode-keys vi             # Vi bindings in copy mode
set -s escape-time 0             # No delay after Esc
set -g detach-on-destroy off     # Stay in tmux when session closes
set -g renumber-windows on       # No gaps after closing windows
set -g mouse on                  # Mouse on
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh $HOME/.tmux-tools/tmux-copy-osc52"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' 
set -g @plugin 'catppuccin/tmux' 
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name' 
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Make save-workspace harder to trigger accidentally.
set -g @resurrect-save 'C-F12'
# Remove old resurrect save binding when re-sourcing config.
unbind-key -T prefix C-s

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Keybindings
bind h split-window -h -c "#{pane_current_path}"   # Split vertical
bind v split-window -v -c "#{pane_current_path}"   # Split horizontal
bind-key -n C-S-Left swap-window -d -t -1          # Moving windows. No prefix
bind-key -n C-S-Right swap-window -d -t +1         # Moving windows. No prefix
bind-key -n S-Enter send-keys C-j                  # Shift+Enter inserts newline

bind a display-popup -h 15 -w 30 -E "$HOME/.tmux-tools/tmux-session-switcher"
bind f display-popup -E "$HOME/.tmux-tools/tmux-file-picker"
bind g display-popup -E "$HOME/.tmux-tools/tmux-file-picker --directories"
bind o display-popup -E "$HOME/.tmux-tools/tmux-zoxide-window"     # Zoxide window
bind l display-popup -h 30 -w 100 -E "workmux dashboard"
bind W command-prompt -I "#W" "rename-window '%%' \; set-window-option automatic-rename off"
bind S command-prompt -I "#S" "rename-session '%%'"

# Toggle outer tmux key handling for nested tmux sessions.
set -g @nested_key_state "OUT"
set -g @nested_current_bg "#a6da95"
bind-key -T root F12 run-shell "$HOME/.tmux-tools/tmux-nested-toggle"
bind-key -T prefix F12 run-shell "$HOME/.tmux-tools/tmux-nested-toggle"
bind-key -T off F12 run-shell "$HOME/.tmux-tools/tmux-nested-toggle"
bind-key -T copy-mode F12 run-shell "$HOME/.tmux-tools/tmux-nested-toggle"
bind-key -T copy-mode-vi F12 run-shell "$HOME/.tmux-tools/tmux-nested-toggle"
bind-key -T off C-s send-keys C-s
bind-key -T prefix 1 select-window -t :=1
bind-key -T prefix 2 select-window -t :=2
bind-key -T prefix 3 select-window -t :=3
bind-key -T prefix 4 select-window -t :=4
bind-key -T prefix 5 select-window -t :=5
bind-key -T prefix 6 select-window -t :=6
bind-key -T prefix 7 select-window -t :=7
bind-key -T prefix 8 select-window -t :=8
bind-key -T prefix 9 select-window -t :=9
bind-key -T root F10 run-shell "$HOME/.tmux-tools/tmux-nested-toggle out"
bind-key -T prefix F10 run-shell "$HOME/.tmux-tools/tmux-nested-toggle out"
bind-key -T off F10 run-shell "$HOME/.tmux-tools/tmux-nested-toggle out"
bind-key -T root F11 run-shell "$HOME/.tmux-tools/tmux-nested-toggle in"
bind-key -T prefix F11 run-shell "$HOME/.tmux-tools/tmux-nested-toggle in"
bind-key -T off F11 run-shell "$HOME/.tmux-tools/tmux-nested-toggle in"
set-hook -g after-select-window 'if -F "#{==:#{@status_is_remote},1}" "run-shell \"$HOME/.tmux-tools/tmux-nested-toggle apply\"" "run-shell \"$HOME/.tmux-tools/tmux-nested-toggle out\""'
set-hook -g client-session-changed 'run-shell "$HOME/.tmux-tools/tmux-nested-toggle out"'

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# status left look and feel
set -g status-left-length 100
set -g @status_is_remote "0"
if-shell 'test -n "$SSH_CLIENT" || test -n "$SSH_TTY"' 'set -g @status_is_remote "1"'
set -g status-left "#[bg=#{@thm_bg},fg=#{@thm_green}] #{?#{==:#{@status_is_remote},1},#H ,}#S "

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "
set -ga status-right "#{?#{==:#{@nested_key_state},IN},#[fg=#{@thm_bg}]#[bg=#{@thm_red}]#[bold] IN #[default],}"

# Remote tmux sessions are usually nested, so keep their status bar minimal.
if-shell 'test -n "$SSH_CLIENT" || test -n "$SSH_TTY"' {
  set -g status-left "#[bg=#{@thm_bg},fg=#{@thm_green}] #H #S "
  set -g status-right ""
  bind-key -T prefix 1 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=1 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 2 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=2 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 3 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=3 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 4 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=4 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 5 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=5 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 6 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=6 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 7 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=7 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 8 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=8 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
  bind-key -T prefix 9 set @nested_key_state "IN" \; set -g @nested_current_bg "#a6da95" \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; select-window -t :=9 \; set -g window-status-current-format "#[bg=#a6da95,fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]#{?@workmux_status, #{@workmux_status},}" \; refresh-client -S
}

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single



# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_bg},fg=#{@thm_yellow}"
set -g window-status-bell-style "bg=#{@thm_bg},fg=#{@thm_red},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format "#[bg=#{@nested_current_bg},fg=#24273a,bold] #I#{?#{!=:#{window_name},Window},: #W,} #[default]"
set -g window-status-current-style "fg=#24273a,bold"
if-shell 'test -n "$SSH_CLIENT" || test -n "$SSH_TTY"' 'set -g @nested_current_bg "#ed8796"'
run-shell "$HOME/.tmux-tools/tmux-nested-toggle apply"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
