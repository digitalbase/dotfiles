"$schema" = "https://starship.rs/config-schema.json"

format = """
[](red)$os$username[](bg:peach fg:red)${custom.smart_directory}[](bg:yellow fg:peach)${custom.git_branch_dedup}$git_status[](fg:yellow bg:green)$c$rust$golang$nodejs$php$java$kotlin$haskell$python[](fg:green bg:lavender)$time[ ](fg:lavender)$line_break$character
"""
right_format = ""
add_newline = true
continuation_prompt = "[∙](bright-black) "
palette = "catppuccin_macchiato"
scan_timeout = 30
command_timeout = 500
follow_symlinks = true

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[os]
format = "[$symbol]($style)"
style = "bg:red fg:crust"
disabled = false

[os.symbols]
Macos = "󰀵"

[username]
show_always = true
format = "[ $user]($style)"
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
disabled = false

[character]
format = "$symbol "
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"
vimcmd_visual_symbol = "[❮](bold fg:yellow)"
vimcmd_replace_symbol = "[❮](bold fg:lavender)"
vimcmd_replace_one_symbol = "[❮](bold fg:lavender)"
disabled = false

[line_break]
disabled = true

[time]
disabled = false
format = "[[  $time ](fg:crust bg:lavender)]($style)"
style = "bg:lavender"
time_format = "%R"
use_12hr = false

[git_status]
format = "[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)"
style = "bg:yellow"
stashed = '\$'
ahead = "⇡"
behind = "⇣"
up_to_date = ""
diverged = "⇕"
conflicted = "="
deleted = "✘"
renamed = "»"
modified = "!"
staged = "+"
untracked = "?"
disabled = false

[nodejs]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[php]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[python]
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[c]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = " "
style = "bg:green"
version_format = "v${raw}"
disabled = false

[rust]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[golang]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[java]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = " "
style = "bg:green"
version_format = "v${raw}"
disabled = false

[kotlin]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[haskell]
format = "[[ $symbol( $version) ](fg:crust bg:green)]($style)"
symbol = ""
style = "bg:green"
version_format = "v${raw}"
disabled = false

[custom.smart_directory]
format = "[ $output ]($style)"
style = "bg:peach fg:crust"
when = "true"
shell = ["zsh", "--no-rcs"]
command = '''
cols=${COLUMNS:-120}
cwd=${PWD/#$HOME/~}
leaf=${cwd##*/}

git_root=$(git rev-parse --show-toplevel 2>/dev/null)
if [ -n "$git_root" ]; then
  repo=${git_root##*/}
  rel=${PWD#"$git_root"/}
  if [ "$PWD" = "$git_root" ]; then
    rel=""
  fi

  if [ "$cols" -lt 80 ]; then
    if [ -n "$rel" ]; then
      printf "%s/%s" "$repo" "${PWD##*/}"
    else
      printf "%s" "$repo"
    fi
  elif [ "$cols" -lt 110 ]; then
    if [ -n "$rel" ]; then
      printf "%s/%s" "$repo" "$rel"
    else
      printf "%s" "$repo"
    fi
  else
    if [ "$cwd" = ~* ]; then
      printf "%s" "$cwd"
    else
      printf "%s" "$repo${rel:+/$rel}"
    fi
  fi
else
  if [ "$cols" -lt 80 ]; then
    printf "%s" "$leaf"
  elif [ "$cols" -lt 110 ]; then
    if [ "$cwd" = ~/*/* ]; then
      printf "~/%s" "$leaf"
    else
      printf "%s" "$cwd"
    fi
  else
    printf "%s" "$cwd"
  fi
fi
'''

[custom.git_branch_dedup]
format = "[[ $output ](fg:crust bg:yellow)]($style)"
style = "bg:yellow"
when = "[ ${COLUMNS:-120} -ge 80 ] && git rev-parse --is-inside-work-tree >/dev/null 2>&1"
shell = ["zsh", "--no-rcs"]
command = '''
cols=${COLUMNS:-120}
leaf=${PWD##*/}
branch=$(git symbolic-ref --short -q HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null)

if [ -n "$branch" ] && [ "$branch" != "$leaf" ]; then
  printf " %s" "$branch"
fi
'''
